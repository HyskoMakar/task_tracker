<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap');
      * {
        font-family: "Elms Sans", sans-serif;
        font-weight: 600;
      }
    </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand mb-0 h1" href="{% url 'task-list' %}">Task Tracker</a>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <!-- <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"aria-expanded="false">
              Tasks
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="{% url 'task-list' %}">All tasks</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item" href="{% url 'task-list' %}">My tasks</a></li>
            </ul>
          </li> -->
        </ul>
      </div>
      <div class="hstack gap-2">
        <div>
          {% if request.user.is_authenticated %}
            <a class="btn btn-outline-primary" href="{% url 'task-create' %}"><i class="bi bi-plus-lg"></i> Create new
            </a>
            <a href="" class="btn btn-outline-danger">Logout</a>
          {% else %}
            <div class="btn-group" role="group">
              <a href="" class="btn btn-outline-primary">Sign in</a>
              <a href="" class="btn btn-outline-primary">Sign up</a>
            </div>
          {% endif %}
        </div>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>
    </div>
  </nav>
  <div class="container mb-3">
    {% block content %}{% endblock %}
  </div>
  <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100;">
    {% if messages %}
      {% for message in messages %}
        <div role="alert" aria-live="assertive" aria-atomic="true" class="toast border border-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %}" data-bs-autohide="false">
          <div class="toast-header">
            <strong class="me-auto">Task Tracker</strong>
            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
          </div>
          <div class="toast-body">
            {{ message }}
          </div>
        </div>
      {% endfor %}
    {% endif %}
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var toastElList = [].slice.call(document.querySelectorAll('.toast'))
      
      var toastList = toastElList.map(function (toastEl) {
        var toast = new bootstrap.Toast(toastEl, { delay: 5000 });
        toast.show();
        return toast;
      });
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
