{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
    <h3>Login</h3>
    <div style="width: 100%;" class="mt-3 mb-3 border-bottom"></div>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <p class="mt-3 text-center">No account? <a href="{% url 'register' %}">Register<a></p>
    </div>
  </div>
</div>
{% endblock %}
