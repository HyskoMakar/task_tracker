{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h4>Registration</h4>
      <div style="width: 100%;" class="mt-3 mb-3 border-bottom"></div>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success w-100">Create account</button>
      </form>
      <p class="mt-3 text-center">Already have an account? <a href="{% url 'login' %}">Login<p>
    </div>
  </div>
</div>
{% endblock %}
