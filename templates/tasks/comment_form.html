{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-3">
  <div class="col-md-6">
    <div class="hstack">
      <h2 class="mb-3">Edit comment</h2>
    </div>
    <div style="width: 100%;" class="mt-3 mb-3 border-bottom"></div>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-3">
          <label class="form-label">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div class="text-danger">{{ field.errors }}</div>
          {% endif %}
        </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
    <div style="width: 100%;" class="mt-3 mb-3 border-bottom"></div>
    <a href="{% url 'comment-delete' comment.pk %}" class="btn btn-danger">Delete comment</a>
  </div>
</div>
{% endblock %}
