{% extends "base.html" %}

{% block content %}
<h2 class="mt-3 mb-3">Are you sure you want to delete this task?</h2>
<div style="width: 100%;" class="mt-3 mb-3 border-bottom"></div>
<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn btn-outline-danger">Delete</button>
  <a href="{% url 'task-list'%}" class="btn btn-outline-secondary">Return back</a>
</form>
{% endblock %}
