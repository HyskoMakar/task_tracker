{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-3">
	<div class="col-md-6">
		<form method="post">
			{% csrf_token %}
			{% for field in form %}
			<div class="mb-3">
				<label class="form-label">{{ field.label }}</label>
				{{ field }}
				{% if field.errors %}
					<div class="text-danger">{{ field.errors }}</div>
				{% endif %}
			</div>
			{% endfor %}
			<button type="submit" class="btn btn-primary">Submit</button>
		</form>
	</div>
</div>
{% endblock %}
