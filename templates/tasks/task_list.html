{% extends "base.html" %}

{% block content %}
<h2 class="mt-3 mb-3">Tasks</h2>
<div>
  {% for task in tasks %}
  <div class="card mb-3">
    <span class="badge rounded-pill text-bg-secondary position-absolute top-0 start-100 translate-middle">{{ task.status }}</span>
    <div class="card-body d-flex align-items-center">
        <h5 class="card-title flex-grow-1">{{ task.title }}</h5>
        <a href="{% url 'task-detail' task.pk %}" class="text-reset"><i class="bi bi-chevron-right"></i></a>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
